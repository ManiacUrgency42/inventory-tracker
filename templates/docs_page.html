<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ title }} — inventory-tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f9; color: #222; }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .title { font-weight: 600; font-size: 0.95rem; }
    header nav a { font-size: 0.85rem; color: #555; text-decoration: none; margin-left: 20px; }
    header nav a:hover { color: #000; }

    .layout { display: flex; max-width: 1000px; margin: 48px auto; padding: 0 24px; gap: 40px; }

    /* Sidebar */
    aside { width: 160px; flex-shrink: 0; }
    aside nav { position: sticky; top: 32px; }
    aside nav a {
      display: block;
      font-size: 0.85rem;
      color: #666;
      text-decoration: none;
      padding: 7px 12px;
      border-radius: 6px;
      margin-bottom: 2px;
    }
    aside nav a:hover { background: #eee; color: #222; }
    aside nav a.active { background: #222; color: #fff; }
    aside nav .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      padding: 0 12px;
      margin-bottom: 6px;
    }

    /* Content */
    article { flex: 1; min-width: 0; }
    article h1 { font-size: 1.4rem; margin-bottom: 6px; }
    article h2 { font-size: 1.05rem; font-weight: 600; margin-top: 40px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
    article h3 { font-size: 0.95rem; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
    article p  { font-size: 0.9rem; line-height: 1.7; margin-bottom: 14px; color: #333; }
    article ul, article ol { padding-left: 20px; margin-bottom: 14px; }
    article li { font-size: 0.9rem; line-height: 1.7; color: #333; }
    article hr { border: none; border-top: 1px solid #eee; margin: 32px 0; }

    pre {
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }
    code { font-family: "Menlo", "Consolas", monospace; }
    p code, li code, td code {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.82rem;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 20px; }
    th, td { border: 1px solid #e5e5e5; padding: 9px 12px; text-align: left; }
    th { background: #fafafa; font-weight: 600; font-size: 0.78rem; color: #555; }
    tr:hover td { background: #fafafa; }

    .mermaid { margin: 24px 0; }
  </style>
</head>
<body>

<header>
  <span class="title">inventory-tracker / docs / {{ section }}</span>
  <nav>
    <a href="/">Scanner</a>
    <a href="/admin">Admin</a>
  </nav>
</header>

<div class="layout">
  <aside>
    <nav>
      <div class="label">Docs</div>
      <a href="/docs">Overview</a>
      <a href="/docs/user"   class="{{ 'active' if section == 'user' }}">User Guide</a>
      <a href="/docs/dev"    class="{{ 'active' if section == 'dev' }}">Developer</a>
      <a href="/docs/data"   class="{{ 'active' if section == 'data' }}">Data</a>
    </nav>
  </aside>

  <article>
    {{ body | safe }}
  </article>
</div>

<script>
  document.querySelectorAll("code.language-mermaid").forEach(el => {
    const wrapper = document.createElement("div");
    wrapper.classList.add("mermaid");
    wrapper.textContent = el.textContent;
    el.parentElement.replaceWith(wrapper);
  });
  mermaid.initialize({ startOnLoad: true, theme: "neutral" });
</script>
</body>
</html>
