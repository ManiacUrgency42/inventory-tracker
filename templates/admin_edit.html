<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit — {{ item['name'] }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f9; color: #222; }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .title { font-weight: 600; font-size: 0.95rem; }
    header nav a { font-size: 0.85rem; color: #555; text-decoration: none; margin-left: 20px; }
    header nav a:hover { color: #000; }

    main { max-width: 480px; margin: 60px auto; padding: 0 24px; }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 28px; }

    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 28px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .field label { font-size: 0.75rem; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
    .field input {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      background: #fff;
    }
    .field input:focus { outline: none; border-color: #888; }

    .actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn { padding: 9px 20px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
    .btn-primary { background: #222; color: #fff; }
    .btn-primary:hover { background: #444; }
    .btn-ghost { background: transparent; color: #555; border: 1px solid #ddd; }
    .btn-ghost:hover { background: #f0f0f0; }
  </style>
</head>
<body>

<header>
  <span class="title">inventory-tracker / admin / edit</span>
  <nav>
    <a href="/admin">← Admin</a>
    <a href="/">Scanner</a>
  </nav>
</header>

<main>
  <h1>Edit — {{ item['name'] }}</h1>
  <div class="card">
    <form method="post" action="/admin/edit/{{ item['id'] }}">
      <div class="field">
        <label>Barcode</label>
        <input type="text" name="barcode" value="{{ item['barcode'] }}" required />
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" name="name" value="{{ item['name'] }}" required autofocus />
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" name="description" value="{{ item['description'] or '' }}" />
      </div>
      <div class="field">
        <label>Quantity</label>
        <input type="number" name="quantity" value="{{ item['quantity'] }}" min="0" />
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" name="location" value="{{ item['location'] or '' }}" />
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a href="/admin" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
