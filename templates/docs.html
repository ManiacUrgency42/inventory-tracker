<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>inventory-tracker docs</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 780px;
      margin: 60px auto;
      padding: 0 24px;
      color: #222;
      line-height: 1.6;
    }
    h1 { font-size: 1.8rem; border-bottom: 2px solid #eee; padding-bottom: 8px; }
    h2 { font-size: 1.2rem; margin-top: 40px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    h3 { font-size: 1rem; margin-top: 24px; }
    pre {
      background: #f5f5f5;
      padding: 14px 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.875rem;
    }
    code { font-family: "Menlo", "Consolas", monospace; font-size: 0.875rem; }
    p > code, li > code {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; font-weight: 600; }
    a { color: #0066cc; }
    .mermaid { margin: 24px 0; }
    nav { margin-bottom: 32px; font-size: 0.9rem; }
    nav a { margin-right: 16px; color: #555; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #eee; margin: 32px 0; }
  </style>
</head>
<body>
  <nav><a href="/">← Scanner</a></nav>
  {{ body | safe }}
  <script>
    // Mermaid renders code blocks with class="language-mermaid"
    document.querySelectorAll("code.language-mermaid").forEach(el => {
      const wrapper = document.createElement("div");
      wrapper.classList.add("mermaid");
      wrapper.textContent = el.textContent;
      el.parentElement.replaceWith(wrapper);
    });
    mermaid.initialize({ startOnLoad: true, theme: "neutral" });
  </script>
</body>
</html>
