<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory Scanner</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
    h1   { margin-bottom: 24px; }
    input[type="text"] {
      width: 100%; padding: 12px; font-size: 1.1rem;
      border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    button {
      margin-top: 12px; padding: 10px 24px; font-size: 1rem;
      background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #555; }
  </style>
</head>
<body>
  <nav style="margin-bottom:32px;font-size:0.9rem;display:flex;gap:20px;">
    <a href="/admin" style="color:#555;text-decoration:none;">Admin</a>
    <a href="/docs"  style="color:#555;text-decoration:none;">Docs</a>
  </nav>
  <h1>Scan a barcode</h1>
  <form action="/scan" method="post">
    <input
      type="text"
      name="barcode"
      autofocus
      autocomplete="off"
      placeholder="Scan or type barcode…"
    />
    <button type="submit">Enter</button>
  </form>
</body>
</html>
